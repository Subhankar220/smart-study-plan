<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Study Planner</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(0, 114, 255, 0.5);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 500;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .highlight {
      color: #00c6ff;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>📚 Smart Study Planner</h2>

    <input type="text" id="subject" placeholder="Enter Subject">
    <input type="date" id="deadline">

    <button onclick="generatePlan()">Generate Plan</button>

    <div id="result"></div>
  </div>

  <script>
    function generatePlan() {
      let subject = document.getElementById("subject").value;
      let deadline = new Date(document.getElementById("deadline").value);
      let today = new Date();

      let diffTime = deadline - today;
      let daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      if (daysLeft > 0 && subject !== "") {
        let hoursPerDay = (3 / daysLeft).toFixed(2);

         document.getElementById("result").innerHTML =
           ` Plan: <span class="highlight">${hoursPerDay} hrs/day</span><br>
            Stay consistent for <span class="highlight">${daysLeft} days</span><br>`;
      } else {
        document.getElementById("result").innerText =
          "Please enter valid details!";
      }
    }
  </script>

</body>
</html>
